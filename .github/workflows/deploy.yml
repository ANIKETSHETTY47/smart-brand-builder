name: Deploy Smart Brand Platform

on:
  push:
    branches:
      - main

jobs:
  stage-1-code-quality-and-linting:
    name: "Stage 1: Code Quality & Linting"
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pytest flake8 requests boto3
    - name: Run Flake8 Static Analysis
      run: |
        # Warning checks only for syntax errors or undefined names to enforce quality without breaking style
        flake8 backend/ --count --select=E9,F63,F7,F82 --show-source --statistics
    - name: Run Unit Tests
      env:
        PYTHONPATH: .
      run: |
        pytest tests/

  stage-2-security-scanning-sast:
    name: "Stage 2: Security Scanning & SAST"
    needs: stage-1-code-quality-and-linting
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    - name: Install Bandit
      run: pip install bandit
    - name: Run Bandit SAST
      # -ll ignores low severity, -ii ignores low confidence
      # Targeting backend/*.py specifically excludes 3rd-party pip installed packages (like requests)
      run: bandit backend/*.py -ll -ii

  stage-3a-build-backend:
    name: "Stage 3a: Build Backend"
    needs: stage-2-security-scanning-sast
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    - name: Package Lambdas
      run: |
        cd backend
        pip install requests -t .
        zip -r ../lambda_main.zip . -x "*__pycache__*"
        cp ../lambda_main.zip ../lambda_audit.zip
    - name: Upload Backend Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: backend-zips
        path: |
          lambda_main.zip
          lambda_audit.zip

  stage-3b-build-frontend:
    name: "Stage 3b: Build Frontend"
    needs: stage-2-security-scanning-sast
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Verify Frontend Structure
      run: test -f frontend/index.html
    - name: Upload Frontend Artifact
      uses: actions/upload-artifact@v4
      with:
        name: frontend-assets
        path: frontend/

  stage-4-deploy-to-aws:
    name: "Stage 4: Deploy to AWS"
    needs: [stage-3a-build-backend, stage-3b-build-frontend]
    runs-on: ubuntu-latest
    steps:
    - name: Configure AWS Credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
        aws-region: ${{ secrets.AWS_REGION }}
        
    - name: Download Backend Artifacts
      uses: actions/download-artifact@v4
      with:
        name: backend-zips
        
    - name: Download Frontend Artifacts
      uses: actions/download-artifact@v4
      with:
        name: frontend-assets
        path: frontend
        
    - name: Deploy Main Lambda
      run: |
        aws lambda update-function-code \
          --function-name brand-domain-api-lambda \
          --zip-file fileb://lambda_main.zip
          
    - name: Deploy Audit Lambda
      run: |
        aws lambda update-function-code \
          --function-name brand-domain-audit-lambda \
          --zip-file fileb://lambda_audit.zip

    - name: Sync Frontend to S3
      run: |
        aws s3 sync frontend/ s3://brand-domain-frontend-bucket-32550 \
          --exclude ".DS_Store" \
          --delete
