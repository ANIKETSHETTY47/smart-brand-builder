name: Deploy Smart Brand Platform

on:
  push:
    branches:
      - main

jobs:
  test-and-deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Install Test Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pytest requests boto3

    - name: Run Unit Tests
      env:
        PYTHONPATH: .
      run: |
        pytest tests/

    - name: Configure AWS Credentials
      uses: aws-actions/configure-aws-credentials@v2
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
        aws-region: ${{ secrets.AWS_REGION }}

    - name: Package Lambdas
      run: |
        # Package Main Lambda
        cd backend
        pip install requests -t .
        zip -r ../lambda_main.zip . -x "*__pycache__*"
        
        # We can use the same zip for both functions if we want,
        # but the assignment requests separate zip files. In this serverless micro-monolith structure,
        # both lambdas share the file scope, but have different handlers
        cp ../lambda_main.zip ../lambda_audit.zip
        cd ..

    - name: Deploy Main Lambda
      run: |
        aws lambda update-function-code \
          --function-name brand-domain-api-lambda \
          --zip-file fileb://lambda_main.zip

    - name: Deploy Audit Lambda
      run: |
        aws lambda update-function-code \
          --function-name brand-domain-audit-lambda \
          --zip-file fileb://lambda_audit.zip

    - name: Sync Frontend to S3
      run: |
        aws s3 sync frontend/ s3://brand-domain-frontend-bucket \
          --exclude ".DS_Store" \
          --delete
